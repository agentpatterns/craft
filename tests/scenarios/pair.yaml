skill: pair
version: "2026-03-06"
category: behavioral

# Triggering tests for the pair skill.
#
# The testable unit is the description field:
#   "Guided pair-programming mode where Claude teaches rather than writes code,
#    ensuring engineers learn while building"
#
# Probe with: "When would you use the pair skill?"

triggering:
  positive:
    # Direct trigger variants from the triggers array
    - "enter pair mode so I can work through this feature with guidance"
    - "pair with me on implementing this authentication flow"
    - "I want to learn how to write a database migration script — walk me through it"
    - "I want to learn while building — guide me through refactoring this service layer"

    # Phrases aligned with "teaching/learning while building" intent
    - "I want to learn how Redux state management works by actually building it"
    - "help me learn how to write async tests by working through one together"
    - "I'd like to learn the repository pattern — can you guide me through implementing one?"
    - "walk me through how to approach building this feature rather than just doing it for me"

    # Phrases that emphasize the knowledge-transfer goal
    - "I'm new to this codebase — pair with me so I understand what I'm doing"
    - "don't write the code for me, but help me figure out how to implement this caching layer"
    - "I want to develop my skills — guide me through solving this bug rather than fixing it for me"
    - "I want to learn how to add a value to the Redux store — engineers on my team keep doing it wrong"

    # Edge case: engineer invokes pair mid-task
    - "actually, let's switch to pair mode so I can understand what I'm doing here"

  negative:
    # Should trigger research instead (exploration/investigation, not guided learning)
    - "research how the authentication system works before I start implementing OAuth"
    - "explore the codebase to understand how events are processed"
    - "investigate how the existing plugin system is structured"

    # Should trigger draft instead (planning, not guided building)
    - "create an implementation plan for adding the new payment provider"
    - "draft a step-by-step plan for the webhook feature"
    - "write a technical plan for refactoring the order service"

    # Should trigger craft instead (direct execution, not guided learning)
    - "implement the feature from the draft plan"
    - "execute the beads task graph for the login refactor"
    - "build out the discount code validator from the spec"

    # Should trigger tdd instead (test-first workflow, not guided learning)
    - "write the failing tests first before I implement the validator"
    - "let's do TDD on the new API endpoint"
    - "set up the test suite with red tests before we start"

    # Should trigger reflect instead (retrospective, not live session)
    - "let's do a retrospective on the session we just finished"
    - "reflect on what patterns we used and what to improve next time"
    - "review what we accomplished and suggest improvements to the skill"

    # Should trigger tdd instead (executing TDD workflow, not learning about it)
    - "use TDD to implement this feature — just do it without explaining"
    - "run test-driven development on the payment processor autonomously"

    # Completely unrelated
    - "fix this null pointer exception in the UserService"
    - "rename this variable to something more descriptive"
    - "run the test suite and show me what's failing"

functional:
  - id: pair-01
    description: AskUserQuestion is used to collect strictness level before the session begins
    grading: llm-judge
    given: |
      An engineer invokes pair mode without specifying a strictness level.
    when: "pair with me on adding a new field to the user profile"
    then:
      - "AskUserQuestion is called to present the three strictness options (Strict, Pseudocode, Collaborative)"
      - "The question is presented BEFORE any code guidance or session work begins"
      - "The skill waits for an engineer response before proceeding"
      - "Strictness level is stored and referenced in the Session Started confirmation block"
    notes: "Skipping the strictness question and defaulting to a level is the primary failure mode to watch for"

  - id: pair-02
    description: Domain familiarity assessment is always performed as a required step
    grading: llm-judge
    given: |
      An engineer invokes pair mode. Even if the task description is very clear (e.g., inline description provided).
    when: "teach me how to write a database migration script"
    then:
      - "AskUserQuestion is called to ask about the engineer's familiarity level"
      - "The familiarity question is asked AFTER strictness is established but BEFORE session work begins"
      - "The skill does NOT infer familiarity from the task description or skip this step"
      - "The familiarity level appears in the Session Started confirmation block"
      - "Subsequent guidance depth reflects the stated familiarity level"
    notes: "The SKILL.md explicitly marks this step REQUIRED and says 'Do NOT infer or skip this step'. Skipping it is a hard failure."

  - id: pair-03
    description: In STRICT mode, Claude never writes production code — only asks guiding questions and reviews
    grading: llm-judge
    given: |
      Engineer has selected STRICT strictness level. Session is underway. Engineer has submitted a code attempt.
    when: |
      Engineer says: "I'm not sure what to do next — can you just show me the implementation?"
    then:
      - "Claude does NOT write any production-ready code in response"
      - "Claude acknowledges the request and redirects to a guiding question or hint"
      - "Claude reminds the engineer that they can /unpair to exit pair mode if needed"
      - "The response uses Socratic questioning or the progressive hints ladder (Nudge → Direction → Specific)"
      - "No code block containing runnable production code appears in the response"
    notes: "Writing even a 'small example' counts as a violation in STRICT mode. Pseudocode or skeleton code would also be a violation in strict."

  - id: pair-04
    description: Progressive hints escalate from Nudge to Direction to Specific without skipping levels
    grading: llm-judge
    given: |
      Engineer is stuck on a specific problem (e.g., async handling). They have asked for help once (received a Nudge) and are still stuck.
    when: |
      Engineer says: "I still don't understand — the async call seems fine to me but it's not working"
    then:
      - "The second hint is at Direction level — identifies the general area of the problem without pinpointing the exact line"
      - "The hint does NOT jump directly to the Specific level (exact line/fix)"
      - "The hint is phrased as guidance, not a statement of the answer"
      - "If the engineer remains stuck after Direction, the next hint escalates to Specific"
    notes: "Jumping from Nudge straight to Specific — or from Nudge straight to showing code — is the failure mode this test catches"

  - id: pair-05
    description: Session exit summary contains specific next steps referencing concepts from the session
    grading: llm-judge
    given: |
      A pair session covering async/await patterns and error handling in a TypeScript service. Engineer types /unpair to end the session.
    when: "/unpair"
    then:
      - "Summary includes a 'Suggested Next Steps' section"
      - "Every next step references a concept, pattern, file, or topic discussed in THIS session"
      - "No generic advice appears (e.g., 'keep practicing', 'read more about testing', 'try building another feature')"
      - "At least one next step is specific enough to act on immediately without clarification"
      - "Summary includes 'Concepts Covered', 'Key Learnings', and 'What You Built/Fixed' sections"
    notes: "Generic next steps are explicitly forbidden by the SKILL.md. The judge should fail any output where a next step could apply to any session regardless of content."
