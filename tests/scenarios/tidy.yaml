skill: tidy
version: "2026-03-06"
category: structured-output

# Triggering tests for the tidy skill.
#
# The testable unit is the description field:
#   "Audit agent-facing documentation for staleness and recommend fixes.
#    Use when CLAUDE.md or READMEs may be out of date."
#
# Probe with: "When would you use the tidy skill?"

triggering:
  positive:
    # Direct trigger words from the triggers array
    - "audit the agent documentation before we start this feature"
    - "audit documentation for staleness before the new sprint"
    - "audit docs before we start the new sprint"
    - "CLAUDE.md is probably out of date after the recent refactor"
    - "check the agent docs for stale references"

    # Phrases aligned with the description's "staleness" intent
    - "CLAUDE.md is out of date after all those renames — can you audit it?"
    - "the READMEs probably have staleness issues — recommend fixes"
    - "audit the documentation for staleness after we moved the files"
    - "before we start the OAuth work, make sure the agent docs are accurate"
    - "go through CLAUDE.md and find anything that no longer matches the codebase"

    # Phrasing around specific staleness types
    - "CLAUDE.md has stale references — audit and recommend fixes"
    - "audit the READMEs and recommend fixes for out-of-date commands"
    - "look for broken internal links in the project documentation"
    - "audit the docs for outdated descriptions of features we removed"
    - "find any stale cross-references between CLAUDE.md and the architecture doc"

  negative:
    # Should trigger refactor instead (code cleanup, not doc cleanup)
    - "clean up the TypeScript in the auth module — there are too many any types"
    - "refactor the order processing service to remove duplication"
    - "tidy up the dead code in the utils directory"
    - "the helpers module is messy, can you reorganize it"

    # Should trigger research instead (exploration, not audit)
    - "research how authentication is implemented before I add OAuth"
    - "explore the codebase to understand how plugins are loaded"
    - "investigate the event system before I add webhooks"

    # Should trigger documentation-writer instead (writing new docs, not auditing existing)
    - "write documentation for the new payment API"
    - "create a README for the new plugin I just built"
    - "document the architecture decisions we made today"
    - "write a guide for how to add a new skill to the plugin"

    # Should trigger craft/draft instead (feature execution, not doc audit)
    - "implement the discount codes feature from the plan"
    - "execute the yaks task graph for the OAuth work"
    - "build the webhook system from the draft plan"

    # Ambiguous: "fix" on code, not docs
    - "fix the null pointer exception in OrderService"
    - "fix the failing tests in the auth module"

functional:
  - id: tidy-01
    description: Detects a broken internal link in CLAUDE.md and classifies it as must-fix
    grading: code
    given: |
      A project where CLAUDE.md contains a markdown link such as
      `[architecture](docs/architecture.md)` but the file `docs/architecture.md`
      has been deleted or moved. No other documentation staleness issues exist.
    when: "audit docs — CLAUDE.md might have stale links after the recent file moves"
    then:
      - "AskUserQuestion is called before any Edit or Write tool call"
      - "The findings presented to the user include at least one entry with severity: must-fix"
      - "The must-fix entry references the broken link target path"
      - "No Edit or Write tool call occurs before the user responds to AskUserQuestion"
    notes: "Broken links are must-fix because an agent following the link will fail silently or load the wrong context."

  - id: tidy-02
    description: AskUserQuestion is called to present findings before any fix is applied
    grading: llm-judge
    given: |
      A project where CLAUDE.md has at least two staleness issues of different severities
      (e.g., a broken link classified must-fix, and an outdated description classified should-fix).
    when: "tidy the docs and fix whatever is stale"
    then:
      - "AskUserQuestion is called with a grouped findings list before any file edit"
      - "Findings are grouped by severity (must-fix, should-fix, nice-to-have)"
      - "AskUserQuestion presents the four standard fix-scope options (fix all, must-fix only, must-fix and should-fix, let me pick individually)"
      - "No Edit or Write tool call appears before the user's selection is received"
      - "If the user selects 'must-fix only', only must-fix items are applied"
    notes: "Auto-applying fixes without user confirmation is a known failure mode. The AskUserQuestion gate is non-negotiable per the skill spec."

  - id: tidy-03
    description: Each approved fix is committed with a tidy-prefixed commit message
    grading: code
    given: |
      A project with a git repository. CLAUDE.md has one broken link (must-fix) and one
      stale build command (should-fix). The user selects "fix all" when presented findings.
    when: "tidy first before I start the new feature"
    then:
      - "Exactly one git commit is made per applied fix (not one bulk commit for all fixes)"
      - "Each commit message matches the pattern: `tidy: <description>`"
      - "Commit messages are descriptive (e.g., 'tidy: fix broken link to architecture.md in CLAUDE.md')"
      - "No commit message uses a generic description such as 'tidy: fix docs'"
    notes: "One fix per commit is required by the skill spec. Bulk commits obscure the audit trail."

  - id: tidy-04
    description: Produces a Fixes Applied audit table after all fixes are applied
    grading: code
    given: |
      A project where tidy has been invoked, findings were presented, the user approved
      all fixes, and two fixes have been applied (one must-fix, one should-fix).
    when: "tidy the docs — fix everything you find"
    then:
      - "Skill output contains a section header matching `## Fixes Applied`"
      - "Output contains a markdown table with columns: `#`, `Severity`, `Fix`, `Commit Message`"
      - "Each applied fix appears as a row in the table"
      - "Each row's Severity column contains one of: must-fix, should-fix, nice-to-have"
      - "Each row's Commit Message column contains a value matching the pattern: `tidy: <description>`"
      - "Any skipped findings are noted after the table with a reason"
    notes: "The Fixes Applied table is the primary structured output for this skill. It must be present even if only one fix was applied."

  - id: tidy-05
    description: Skill does not touch source code files — scope boundary enforced
    grading: llm-judge
    given: |
      A project where CLAUDE.md has one stale path reference and a TypeScript source file
      also has an outdated comment referencing a deleted module.
    when: "tidy everything up — clean up stale references wherever you find them"
    then:
      - "Skill reads and audits only documentation files (*.md, CLAUDE.md, README.md, AGENTS.md)"
      - "No Edit or Write tool call targets a TypeScript, JavaScript, Python, or other source file"
      - "If the skill identifies the source code comment as out of scope, it notes this in output"
      - "Skill does NOT suggest refactoring or code cleanup as part of its findings"
      - "Summary references the scope boundary (docs only) explicitly"
    notes: "Scope leakage into source files is a hard failure. The skill spec explicitly excludes code analysis."
